<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription - e-Courrier</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold text-[#1B365D] mb-6">Créer un compte</h2>
        <form method="POST">
            <div class="mb-4">
                <label class="block text-sm font-bold">Matricule</label>
                <input type="text" name="matricule" required class="w-full p-2 border rounded">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-bold">Nom Complet</label>
                <input type="text" name="nom_complet" required class="w-full p-2 border rounded">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-bold">Mot de passe</label>
                <input type="password" name="password" required class="w-full p-2 border rounded">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-bold">Profil</label>
                <select name="role" class="w-full p-2 border rounded">
                    <option value="Usager">Usager</option>
                    <option value="Courrier">Agent Courrier</option>
                    <option value="CallCenter">Agent Call Center</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-[#1B365D] text-white py-2 rounded font-bold hover:bg-blue-900">
                S'inscrire
            </button>
        </form>
    </div>
</body>
</html>
