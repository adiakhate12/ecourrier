<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dépôt de Dossier - E-Courrier DGB</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-md">
        <h2 class="text-2xl font-bold mb-6 text-[#1B365D]">Déposer un dossier</h2>
        <form action="/api/ecourrier/dossier/deposer" method="POST" enctype="multipart/form-data">
            <div class="mb-4">
                <label class="block text-sm font-bold mb-2">Matricule</label>
                <input type="text" name="matricule" required class="w-full p-2 border rounded">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-bold mb-2">Objet du dossier</label>
                <input type="text" name="objet" required class="w-full p-2 border rounded">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-bold mb-2">Document (PDF/Image)</label>
                <input type="file" name="fichier" required class="w-full p-2 border rounded">
            </div>
            <button type="submit" class="w-full bg-[#1B365D] text-white py-2 rounded font-bold hover:bg-blue-900">
                Valider le dépôt
            </button>
        </form>
    </div>
</body>
</html>
