<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - e-Courrier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .card-login { max-width: 400px; margin-top: 100px; border: none; }
        .btn-dgb { background-color: #1B365D; color: white; }
        .btn-dgb:hover { background-color: #11223c; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 d-flex justify-content-center">
                <div class="card card-login shadow-sm p-4 w-100">
                    <div class="text-center mb-4">
                        <h4 class="fw-bold" style="color: #1B365D;">🏛️ eCOURRIER</h4>
                        <p class="text-muted small">Espace Administratif - DGB</p>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger p-2 small text-center">{{ error }}</div>
                    {% endif %}

                    <form method="POST" action="/login">
                        <div class="mb-3">
                            <label for="matricule" class="form-label small fw-bold">Matricule Professionnel</label>
                            <input type="text" name="matricule" class="form-control" id="matricule" placeholder="Ex: ADM/001" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label small fw-bold">Mot de passe</label>
                            <input type="password" name="password" class="form-control" id="password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-dgb w-100 fw-bold py-2 mt-2">Se connecter</button>
                    </form>
                    
                    <div class="mt-4 text-center">
                        <a href="/" class="text-decoration-none small" style="color: #1B365D;">⬅ Retour à l'accueil usager</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
