<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Agent | e-Courrier DGB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo DGB" class="mx-auto h-20 w-auto mb-4">
            <h1 class="text-2xl font-bold text-[#1B365D]">Espace Agent</h1>
            <p class="text-gray-500 text-sm">Veuillez vous identifier pour accéder au portail.</p>
        </div>

        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Matricule</label>
                <input type="text" name="matricule" required class="w-full px-4 py-2 mt-1 border rounded-lg focus:ring-2 focus:ring-[#1B365D] outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Mot de passe</label>
                <input type="password" name="password" required class="w-full px-4 py-2 mt-1 border rounded-lg focus:ring-2 focus:ring-[#1B365D] outline-none">
            </div>
            <button type="submit" class="w-full bg-[#1B365D] text-white py-2 rounded-lg font-bold hover:bg-blue-900 transition">
                Se connecter
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="/" class="text-sm text-gray-400 hover:text-gray-600">Retour à l'accueil</a>
        </div>
    </div>

</body>
</html>
